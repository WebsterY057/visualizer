<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跨所可视化分析平台</title>
<style>
  /* ============================================================
     天蓝色 + 灰色 专业主题
     主色: #4FA8D7 (天蓝色), 辅色: #8A8A8A (灰色)
     ============================================================ */
  :root {
    --sky:       #4FA8D7;
    --sky-light: #7EC4E8;
    --sky-dark:  #3A8AB8;
    --gray-1:    #2A2A2E;
    --gray-2:    #353538;
    --gray-3:    #404044;
    --gray-4:    #888888;
    --gray-5:    #BBBBBB;
    --bg:        #1E1E22;
    --pos:       #4CAF82;
    --neg:       #E05C5C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--gray-5); min-height: 100vh; }
  .header { background: var(--gray-1); border-bottom: 1px solid var(--gray-3); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .header h1 { font-size: 18px; font-weight: 600; color: var(--sky); }
  .header .subtitle { font-size: 12px; color: var(--gray-4); }
  .top-tabs { display: flex; gap: 8px; }
  .top-tab { padding: 6px 12px; border: 1px solid var(--gray-3); border-radius: 6px; color: var(--gray-4); text-decoration: none; font-size: 12px; }
  .top-tab.active { border-color: var(--sky); color: var(--sky); background: var(--gray-2); }
  .main { display: flex; min-height: calc(100vh - 60px); }

  /* 左侧控制面板 */
  .sidebar { width: 320px; background: var(--gray-1); border-right: 1px solid var(--gray-3); padding: 20px; overflow-y: auto; flex-shrink: 0; }
  .panel-section { margin-bottom: 24px; }
  .panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--gray-4); margin-bottom: 10px; font-weight: 600; }

  /* 选择器样式 */
  .ctrl-group { margin-bottom: 12px; }
  .ctrl-label { font-size: 12px; color: var(--gray-4); margin-bottom: 4px; display: block; }
  select, input[type="text"], input[type="date"] { width: 100%; background: var(--gray-2); border: 1px solid var(--gray-3); border-radius: 6px; color: var(--gray-5); padding: 8px 10px; font-size: 13px; outline: none; transition: border-color 0.2s; }
  select:focus, input:focus { border-color: var(--sky); }
  select[multiple] { height: 120px; }

  /* 图表类型按钮 */
  .chart-types { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .chart-type-btn { background: var(--gray-2); border: 1px solid var(--gray-3); border-radius: 6px; padding: 8px 4px; text-align: center; font-size: 11px; cursor: pointer; transition: all 0.2s; color: var(--gray-4); }
  .chart-type-btn:hover { border-color: var(--sky); color: var(--sky); }
  .chart-type-btn.active { background: var(--sky); border-color: var(--sky); color: var(--bg); font-weight: 600; }

  /* 快捷卡片 */
  .quick-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .quick-card { background: var(--gray-2); border: 1px solid var(--gray-3); border-radius: 6px; padding: 10px 8px; cursor: pointer; transition: all 0.2s; font-size: 12px; }
  .quick-card:hover { border-color: var(--sky); }
  .quick-card.active { border-color: var(--sky); background: var(--gray-3); }
  .quick-card .qc-title { color: var(--sky); font-weight: 600; font-size: 11px; }
  .quick-card .qc-desc { color: var(--gray-4); font-size: 10px; margin-top: 2px; }

  /* 主图表区域 */
  .content { flex: 1; padding: 20px; overflow: auto; }
  .chart-container { background: var(--gray-1); border-radius: 8px; border: 1px solid var(--gray-3); padding: 20px; margin-bottom: 16px; }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .chart-title { font-size: 14px; font-weight: 600; color: var(--sky); }
  .chart-meta { font-size: 11px; color: var(--gray-4); }

  canvas { width: 100% !important; }

  /* 数据表格 */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th { background: var(--gray-2); color: var(--sky); padding: 8px 12px; text-align: left; font-weight: 600; border-bottom: 1px solid var(--gray-3); position: sticky; top: 0; }
  .data-table td { padding: 7px 12px; border-bottom: 1px solid var(--gray-2); color: var(--gray-5); }
  .data-table tr:hover td { background: var(--gray-2); }
  .data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
  .data-table .pos { color: var(--pos); }
  .data-table .neg { color: var(--neg); }

  /* 按钮 */
  .btn { background: var(--sky); color: var(--bg); border: none; border-radius: 6px; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn:hover { background: var(--sky-light); }
  .btn-secondary { background: var(--gray-2); color: var(--gray-5); border: 1px solid var(--gray-3); }
  .btn-secondary:hover { border-color: var(--sky); color: var(--sky); }

  .btn-row { display: flex; gap: 8px; margin-top: 12px; }

  /* 筛选标签 */
  .filter-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .filter-tag { background: var(--gray-2); border: 1px solid var(--gray-3); border-radius: 4px; padding: 3px 8px; font-size: 11px; color: var(--gray-4); display: flex; align-items: center; gap: 4px; }
  .filter-tag span { color: var(--sky); }
  .filter-tag button { background: none; border: none; color: var(--gray-4); cursor: pointer; font-size: 12px; padding: 0; line-height: 1; }
  .filter-tag button:hover { color: var(--neg); }

  /* 加载状态 */
  .loading { text-align: center; padding: 40px; color: var(--gray-4); }
  .loading::after { content: '...'; animation: dots 1.5s infinite; }
  @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

  /* 错误提示 */
  .error-msg { background: #2A1A1A; border: 1px solid var(--neg); border-radius: 6px; padding: 12px; color: var(--neg); font-size: 13px; margin-top: 12px; }

  /* 无数据 */
  .no-data { text-align: center; padding: 40px; color: var(--gray-4); font-size: 13px; }

  /* 分隔线 */
  .divider { border: none; border-top: 1px solid var(--gray-3); margin: 16px 0; }

  /* 统计卡片 */
  .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: var(--gray-1); border: 1px solid var(--gray-3); border-radius: 8px; padding: 14px 16px; }
  .stat-card .sc-label { font-size: 11px; color: var(--gray-4); margin-bottom: 4px; }
  .stat-card .sc-value { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-card .sc-value.pos { color: var(--pos); }
  .stat-card .sc-value.neg { color: var(--neg); }
  .stat-card .sc-value.neu { color: var(--gray-5); }

  /* 复选框组 */
  .checkbox-group { display: flex; flex-direction: column; gap: 4px; max-height: 180px; overflow-y: auto; background: var(--gray-2); border-radius: 6px; padding: 8px; }
  .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray-5); cursor: pointer; }
  .checkbox-item input { accent-color: var(--sky); }
  .checkbox-item:hover { color: var(--sky); }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>跨所可视化分析平台</h1>
  </div>
  <div class="top-tabs">
    <a class="top-tab active" href="/">数据分析</a>
    <a class="top-tab" href="/backtest">回测实验</a>
  </div>
</div>

<div class="main">
  <!-- ========== 左侧控制面板 ========== -->
  <div class="sidebar">

    <!-- 1. 数据库选择 -->
    <div class="panel-section">
      <div class="panel-title">1. 选择数据库</div>
      <div class="ctrl-group">
        <select id="dbSelect" onchange="onDbChange()">
          <option value="">-- 选择数据库 --</option>
        </select>
      </div>
    </div>

    <hr class="divider">

    <!-- 2. 数据表选择 -->
    <div class="panel-section">
      <div class="panel-title">2. 选择数据表</div>
      <div class="ctrl-group">
        <select id="tableSelect" multiple size="8" onchange="onTableChange()" disabled>
          <option value="">-- 先选择数据库 --</option>
        </select>
      </div>
      <div id="tableInfo" style="font-size: 11px; color: #666; margin-top: 4px;"></div>
      <div style="margin-top:8px;">
        <div style="font-size:11px;color:#888;margin-bottom:4px;">已选表：</div>
        <div id="selectedTables" class="filter-tags"></div>
      </div>
    </div>

    <hr class="divider">

    <!-- 3. 字段选择 -->
    <div class="panel-section">
      <div class="panel-title">3. 选择字段</div>
      <div class="ctrl-group">
        <input type="text" id="yFieldSearch" placeholder="搜索字段..." oninput="filterYFields()" style="margin-bottom:6px;">
      </div>
      <div style="margin-bottom:6px;">
        <button class="btn-secondary" onclick="selectAllFields()" style="padding:4px 10px;font-size:11px;">全选</button>
        <button class="btn-secondary" onclick="clearAllFields()" style="padding:4px 10px;font-size:11px;">清空</button>
      </div>
      <div class="checkbox-group" id="yFieldGroup" style="max-height:200px;">
        <!-- 动态填充 -->
      </div>
      <div style="margin-top:8px;">
        <div style="font-size:11px;color:#888;margin-bottom:4px;">已选字段：</div>
        <div id="selectedFields" class="filter-tags"></div>
      </div>
    </div>

    <hr class="divider">

    <!-- 4. 日期范围 -->
    <div class="panel-section">
      <div class="panel-title">4. 日期范围</div>
      <div class="ctrl-group">
        <input type="date" id="dateFrom" style="width:100%;margin-bottom:4px;">
        <span style="font-size:11px;color:#888;">至</span>
        <input type="date" id="dateTo" style="width:100%;margin-top:4px;">
      </div>
    </div>

    <hr class="divider">

    <!-- 5. 图表类型 -->
    <div class="panel-section">
      <div class="panel-title">5. 图表类型</div>
      <div class="chart-types">
        <div class="chart-type-btn active" onclick="setChartType('line', this)">折线图</div>
        <div class="chart-type-btn" onclick="setChartType('bar', this)">柱状图</div>
        <div class="chart-type-btn" onclick="setChartType('pie', this)">饼图</div>
        <div class="chart-type-btn" onclick="setChartType('heatmap', this)">热力图</div>
        <div class="chart-type-btn" onclick="setChartType('scatter', this)">散点图</div>
        <div class="chart-type-btn" onclick="setChartType('radar', this)">雷达图</div>
      </div>
    </div>

    <hr class="divider">

    <!-- 6. 查询按钮 -->
    <div class="panel-section">
      <button class="btn" onclick="renderChart()" style="width:100%;margin-bottom:8px;">生成图表</button>
      <button class="btn-secondary" onclick="showTable()" style="width:100%;">查看数据</button>
    </div>

    <div id="errorBox"></div>
  </div>
  
  <!-- ========== 右侧内容区 ========== -->
  <div class="content">
    <div class="stat-cards" id="statCards" style="display:none;"></div>

    <!-- 数据表格 -->
    <div class="chart-container" id="tableContainer" style="display:none;">
      <div class="chart-header">
        <div class="chart-title">数据明细</div>
        <div style="display:flex; gap:6px;">
          <button class="btn-secondary" style="padding:5px 12px; font-size:11px;" onclick="showTable(); renderCurrentChart();">明细表</button>
          <button class="btn-secondary" style="padding:5px 12px; font-size:11px;" onclick="exportCSV()">导出 CSV</button>
        </div>
      </div>
      <div style="max-height: 500px; overflow: auto;">
        <table class="data-table" id="dataTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 图表区域 -->
    <div class="chart-container" id="chartContainer" style="display:none;">
      <div class="chart-header">
        <div class="chart-title" id="chartTitle">图表</div>
        <div class="chart-meta" id="chartMeta"></div>
      </div>
      <canvas id="mainChart"></canvas>
    </div>

    <div class="no-data" id="noData">
      ← 请从左侧选择数据表和字段，然后点击「生成图表」
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const DB_PATH = '/Users/yy/.hermes/workspace/db/analysis.db';
let meta = {};
let dbList = {};
let currentChart = null;
let chartType = 'line';
let currentData = [];
let currentTable = '';
let currentDb = '';
let activeFilters = {};
let tableColumns = [];
let yFieldsOptions = [];
let selectedTables = [];
let selectedFields = [];

// ============================================================
// 初始化
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  const resp = await fetch('/api/databases');
  dbList = await resp.json();

  const dbSel = document.getElementById('dbSelect');
  Object.entries(dbList).forEach(([key, info]) => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = info.name;
    dbSel.appendChild(opt);
  });
});

async function onDbChange() {
  const dbKey = document.getElementById('dbSelect').value;
  currentDb = dbKey;
  const tableSel = document.getElementById('tableSelect');
  tableSel.innerHTML = '<option value="">-- 加载中 --</option>';
  tableSel.disabled = !dbKey;

  if (!dbKey) {
    tableSel.innerHTML = '<option value="">-- 先选择数据库 --</option>';
    return;
  }

  const resp = await fetch(`/api/tables?db=${dbKey}`);
  meta = await resp.json();

  tableSel.innerHTML = '<option value="">-- 选择数据表 --</option>';
  const tables = Object.keys(meta);
  tables.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t;
    tableSel.appendChild(opt);
  });

  if (tables.length > 0) {
    const defaultTable = tables.find(t => t.includes('k12_token')) || tables[0];
    currentTable = defaultTable;
    tableSel.value = defaultTable;
    await onTableChange();
  }
}

// ============================================================
// 事件处理
// ============================================================

async function onTableChange() {
  const tableSel = document.getElementById('tableSelect');
  selectedTables = Array.from(tableSel.selectedOptions).map(o => o.value).filter(v => v);
  currentTable = selectedTables[0] || '';
  tableFilters = {};
  tableSortCol = null;
  tableSortDir = 'asc';

  renderSelectedTables();

  if (selectedTables.length === 0) {
    yFieldsOptions = [];
    selectedFields = [];
    renderSelectedFields();
    return;
  }

  // 收集所有选中表的字段
  const allColumns = new Map();
  let dateInfo = [];
  let totalRows = 0;

  selectedTables.forEach(t => {
    if (meta[t]) {
      const info = meta[t];
      totalRows += info.row_count || 0;
      if (info.date_range) dateInfo = info.date_range;
      info.columns.forEach(c => {
        if (!allColumns.has(c.name)) {
          allColumns.set(c.name, c);
        }
      });
    }
  });

  document.getElementById('tableInfo').textContent =
    `已选 ${selectedTables.length} 表 | 共 ${totalRows.toLocaleString()} 条`;

  // 填充字段复选框
  const yGroup = document.getElementById('yFieldGroup');
  yGroup.innerHTML = '';
  const excludeNames = ['id', 'created_at', 'date', '日期'];
  yFieldsOptions = [];
  const defaultFields = ['alpha', 'pnl', 'theo', 'bundle', 'gas', 'order_count', 'theoretical_profit', '实际利润', 'bundle_fee', 'gas_fee', 'bnb_pnl', 'spread_range', 'size_range', 'token'];

  const fieldTableMap = {};
  if (selectedTables.length > 1) {
    selectedTables.forEach(t => {
      if (meta[t]?.columns) {
        meta[t].columns.forEach(c => {
          if (excludeNames.includes(c.name)) return;
          const fullName = `${t.replace('汇总', '').replace('大币', '')}_${c.name}`;
          if (!fieldTableMap[c.name]) fieldTableMap[c.name] = [];
          fieldTableMap[c.name].push({ fullName, table: t, col: c });
        });
      }
    });
    Object.keys(fieldTableMap).forEach(baseName => {
      const entries = fieldTableMap[baseName];
      entries.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'checkbox-item';
        const isSelected = selectedFields.includes(entry.fullName);
        const checked = isSelected ? 'checked' : '';
        div.innerHTML = `<input type="checkbox" id="yf_${entry.fullName}" value="${entry.fullName}" ${checked} onclick="onYFieldChange()">
                         <label for="yf_${entry.fullName}">${entry.fullName}</label>`;
        yGroup.appendChild(div);
      });
    });
  } else {
    Array.from(allColumns.values()).forEach(c => {
      if (excludeNames.includes(c.name)) return;
      yFieldsOptions.push(c);
      const div = document.createElement('div');
      div.className = 'checkbox-item';
      const isInDefault = defaultFields.some(f => c.name.includes(f) || f.includes(c.name));
      const isSelected = selectedFields.includes(c.name);
      const checked = (isInDefault || isSelected) ? 'checked' : '';
      div.innerHTML = `<input type="checkbox" id="yf_${c.name}" value="${c.name}" ${checked} onclick="onYFieldChange()">
                       <label for="yf_${c.name}">${c.name}</label>`;
      yGroup.appendChild(div);
    });
  }

  // 设置日期范围
  if (dateInfo[0]) document.getElementById('dateFrom').value = dateInfo[0];
  if (dateInfo[1]) document.getElementById('dateTo').value = dateInfo[1];

  onYFieldChange();
  renderChart();
}

function renderSelectedTables() {
  const container = document.getElementById('selectedTables');
  container.innerHTML = '';
  selectedTables.forEach(t => {
    const tag = document.createElement('div');
    tag.className = 'filter-tag';
    tag.innerHTML = `<span>${t}</span> <button onclick="removeTable('${t}')">×</button>`;
    container.appendChild(tag);
  });
}

function removeTable(t) {
  selectedTables = selectedTables.filter(x => x !== t);
  const tableSel = document.getElementById('tableSelect');
  Array.from(tableSel.options).forEach(o => {
    if (o.value === t) o.selected = false;
  });
  renderSelectedTables();
  onTableChange();
}

function renderSelectedFields() {
  const container = document.getElementById('selectedFields');
  container.innerHTML = '';
  selectedFields.forEach(f => {
    const tag = document.createElement('div');
    tag.className = 'filter-tag';
    tag.innerHTML = `<span>${f}</span> <button onclick="removeField('${f}')">×</button>`;
    container.appendChild(tag);
  });
}

function removeField(f) {
  selectedFields = selectedFields.filter(x => x !== f);
  const cb = document.getElementById('yf_' + f);
  if (cb) cb.checked = false;
  renderSelectedFields();
}

function selectAllFields() {
  yFieldsOptions.forEach(c => {
    if (!selectedFields.includes(c.name)) {
      selectedFields.push(c.name);
    }
    const cb = document.getElementById('yf_' + c.name);
    if (cb) cb.checked = true;
  });
  renderSelectedFields();
}

function clearAllFields() {
  selectedFields = [];
  document.querySelectorAll('#yFieldGroup input').forEach(cb => cb.checked = false);
  renderSelectedFields();
}

function filterYFields() {
  const search = document.getElementById('yFieldSearch').value.toLowerCase();
  const yGroup = document.getElementById('yFieldGroup');
  yGroup.innerHTML = '';
  const excludeNames = ['id', 'created_at', 'date', '日期'];

  if (selectedTables.length > 1) {
    selectedTables.forEach(t => {
      if (meta[t]?.columns) {
        meta[t].columns.forEach(c => {
          if (excludeNames.includes(c.name)) return;
          const fullName = `${c.name}_${t.replace('汇总', '').replace('大币', '')}`;
          if (fullName.toLowerCase().includes(search) || c.name.toLowerCase().includes(search)) {
            const div = document.createElement('div');
            div.className = 'checkbox-item';
            const isSelected = selectedFields.includes(fullName);
            const checked = isSelected ? 'checked' : '';
            div.innerHTML = `<input type="checkbox" id="yf_${fullName}" value="${fullName}" ${checked} onclick="onYFieldChange()">
                             <label for="yf_${fullName}">${fullName}</label>`;
            yGroup.appendChild(div);
          }
        });
      }
    });
  } else {
    yFieldsOptions.forEach(c => {
      if (excludeNames.includes(c.name)) return;
      if (c.name.toLowerCase().includes(search)) {
        const div = document.createElement('div');
        div.className = 'checkbox-item';
        const isSelected = selectedFields.includes(c.name);
        const checked = isSelected ? 'checked' : '';
        div.innerHTML = `<input type="checkbox" id="yf_${c.name}" value="${c.name}" ${checked} onclick="onYFieldChange()">
                         <label for="yf_${c.name}">${c.name}</label>`;
        yGroup.appendChild(div);
      }
    });
  }
}

function onYFieldChange() {
  selectedFields = [];
  document.querySelectorAll('#yFieldGroup input:checked').forEach(cb => {
    if (!selectedFields.includes(cb.value)) {
      selectedFields.push(cb.value);
    }
  });
  renderSelectedFields();
}

function setChartType(type, el) {
  chartType = type;
  document.querySelectorAll('.chart-type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (currentData.length > 0) renderCurrentChart();
}

function setDateRange(range) {
  const to = new Date();
  let from = new Date();
  if (range === '7d') from.setDate(to.getDate() - 7);
  else if (range === '30d') from.setDate(to.getDate() - 30);
  else { document.getElementById('dateFrom').value = ''; document.getElementById('dateTo').value = ''; return; }

  const fromStr = from.toISOString().split('T')[0];
  const toStr = to.toISOString().split('T')[0];
  document.getElementById('dateFrom').value = fromStr;
  document.getElementById('dateTo').value = toStr;
}

function getSelectedYFields() {
  const fields = [];
  document.querySelectorAll('#yFieldGroup input:checked').forEach(cb => fields.push(cb.value));
  return fields;
}

// ============================================================
// 数据查询 & 渲染
// ============================================================

async function renderChart() {
  const table = currentTable;
  const xField = 'date';
  const yFields = getSelectedYFields();
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo = document.getElementById('dateTo').value;

  console.log('renderChart called:', { table, selectedTables, currentDb, yFields, dateFrom, dateTo });

  document.getElementById('errorBox').innerHTML = '';
  document.getElementById('noData').style.display = 'none';
  document.getElementById('chartContainer').style.display = 'none';

  if (!table) { showError('请先选择数据表'); return; }
  if (yFields.length === 0) { showError('请至少选择一个字段'); return; }
  if (!currentDb) { showError('请先选择数据库'); return; }

  try {
    const resp = await fetch('/api/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ table, tables: selectedTables, db: currentDb, x_field: xField, y_fields: yFields, date_from: dateFrom, date_to: dateTo, filters: activeFilters })
    });
    const result = await resp.json();
    console.log('Query result:', result);
    if (!result.success) { showError(result.error); return; }

    currentData = result.data;
    tableColumns = result.data.length > 0 ? Object.keys(result.data[0]) : [xField, ...yFields];

    renderCurrentChart();

    document.getElementById('chartContainer').style.display = 'block';
    document.getElementById('chartTitle').textContent = `${yFields.join(' + ')} by ${xField}`;
    document.getElementById('chartMeta').textContent = `${result.count} 条数据 | 表: ${selectedTables.join(', ')}`;
    document.getElementById('errorBox').innerHTML = '';

  } catch(e) { showError(e.message); console.error('renderChart error:', e); }
}

function getFilteredAggregatedData(yFields, xField) {
  let chartData = currentData;
  const hasActiveFilters = Object.values(tableFilters).some(v => v);
  if (hasActiveFilters) {
    const filtered = currentData.filter(row => {
      return Object.entries(tableFilters).every(([col, filterVal]) => {
        if (!filterVal) return true;
        return String(row[col]) === filterVal;
      });
    });
    const aggregated = {};
    filtered.forEach(r => {
      const key = r[xField];
      if (!aggregated[key]) {
        aggregated[key] = { [xField]: key };
        yFields.forEach(f => aggregated[key][f] = 0);
      }
      yFields.forEach(f => {
        const val = parseFloat(r[f]) || 0;
        aggregated[key][f] += val;
      });
    });
    chartData = Object.values(aggregated);
  }
  return chartData;
}

function renderCurrentChart() {
  if (currentData.length === 0) return;
  if (currentChart) currentChart.destroy();

  const yFields = getSelectedYFields();
  const dateCols = ['date', '日期', 'Date', 'DATE'];
  let xField = 'date';
  for (let col of tableColumns) {
    if (dateCols.includes(col)) {
      xField = col;
      break;
    }
  }

  const chartData = getFilteredAggregatedData(yFields, xField);
  updateStatCards(chartData, yFields);

  const labels = chartData.map(r => String(r[xField]).substring(0, 10));

  // 多色系图表配色（区分度高）
  const chartColors = [
    '#5DADE2', '#4ADE80', '#F87171', '#FBBF24',
    '#A78BFA', '#34D399', '#FB923C', '#E879F9',
    '#38BDF8', '#F472B6', '#6EE7B7', '#FCD34D',
    '#C084FC', '#22D3EE', '#F97316', '#E879F9'
  ];
  const datasets = yFields.map((col, i) => {
    const color = chartColors[i % chartColors.length];
    if (chartType === 'scatter') {
      return {
        label: col,
        data: chartData.map(r => ({
          x: r[xField],
          y: r[col] !== null && r[col] !== undefined ? parseFloat(r[col]) : 0
        })),
        borderColor: color,
        backgroundColor: color + 'cc',
      };
    }
    return {
      label: col,
      data: chartData.map(r => {
        const val = r[col];
        return val !== null && val !== undefined ? parseFloat(val) : 0;
      }),
      borderColor: color,
      backgroundColor: chartType === 'line' ? 'transparent' : color + 'aa',
      borderWidth: 2,
      tension: 0.3,
      pointRadius: chartType === 'line' ? 3 : 0,
      pointHoverRadius: 5,
    };
  });
  
  const ctx = document.getElementById('mainChart').getContext('2d');
  currentChart = new Chart(ctx, {
    type: chartType,
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: chartType === 'pie' || chartType === 'heatmap' ? 1.5 : 2.5,
      plugins: {
        legend: { labels: { color: '#888888', font: { size: 12 } } },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${fmtNum(ctx.raw)}`
          }
        }
      },
      scales: chartType === 'pie' || chartType === 'heatmap' || chartType === 'radar' ? {} : chartType === 'scatter' ? {
        x: { type: 'linear', ticks: { color: '#888888' }, grid: { color: '#353538' } },
        y: { ticks: { color: '#888888', callback: v => fmtNum(v) }, grid: { color: '#353538' } }
      } : {
        x: { ticks: { color: '#888888', maxRotation: 45 }, grid: { color: '#353538' } },
        y: { ticks: { color: '#888888', callback: v => fmtNum(v) }, grid: { color: '#353538' } }
      }
    }
  });
}

function updateStatCards(data, yFields) {
  document.getElementById('statCards').style.display = 'grid';

  let html = '';
  yFields.slice(0, 4).forEach(field => {
    const values = data.map(r => parseFloat(r[field]) || 0).filter(v => !isNaN(v));
    const sum = values.reduce((a, b) => a + b, 0);
    const sumClass = sum >= 0 ? 'pos' : 'neg';
    html += `<div class="stat-card"><div class="sc-label">${field} 合计</div><div class="sc-value ${sumClass}">${fmtNum(sum)}</div></div>`;
  });
  html += `<div class="stat-card"><div class="sc-label">记录数</div><div class="sc-value neu">${data.length.toLocaleString()}</div></div>`;

  document.getElementById('statCards').innerHTML = html;
}

let tableSortCol = null;
let tableSortDir = 'asc';
let tableFilters = {};

async function showTable() {
  const tableSel = document.getElementById('tableSelect');
  const table = tableSel.options[tableSel.selectedIndex]?.value || currentTable;
  if (!table) { showError('请先选择数据表'); return; }
  if (currentData.length === 0) { await renderChart(); }
  if (currentData.length === 0) return;

  document.getElementById('tableContainer').style.display = 'block';

  const dateCols = ['date', '日期', 'Date', 'DATE'];
  const orderedCols = [...tableColumns].sort((a, b) => {
    if (dateCols.includes(a) && !dateCols.includes(b)) return -1;
    if (!dateCols.includes(a) && dateCols.includes(b)) return 1;
    return 0;
  });

  const filterOptions = {};
  orderedCols.forEach(col => {
    const vals = [...new Set(currentData.map(r => r[col] !== null && r[col] !== undefined ? String(r[col]) : ''))];
    vals.sort();
    filterOptions[col] = vals;
  });

  orderedCols.forEach(col => {
    if (!(col in tableFilters)) tableFilters[col] = '';
  });

  let filteredData = currentData.filter(row => {
    return orderedCols.every(col => {
      const filterVal = tableFilters[col];
      if (!filterVal) return true;
      return String(row[col]) === filterVal;
    });
  });

  if (tableSortCol && orderedCols.includes(tableSortCol)) {
    filteredData.sort((a, b) => {
      let va = a[tableSortCol], vb = b[tableSortCol];
      const isNum = typeof va === 'number' && typeof vb === 'number';
      if (isNum) {
        return tableSortDir === 'asc' ? va - vb : vb - va;
      }
      va = String(va || ''), vb = String(vb || '');
      return tableSortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }

  const thead = document.getElementById('tableHead');
  thead.innerHTML = '<tr>' + orderedCols.map(col => {
    const sortIcon = tableSortCol === col ? (tableSortDir === 'asc' ? ' ▲' : ' ▼') : '';
    return `<th onclick="toggleSort('${col}')" style="cursor:pointer; user-select:none;">${col}${sortIcon}</th>`;
  }).join('') + '</tr>';

  const filterRow = document.createElement('tr');
  filterRow.style.background = '#2A2A2E';
  orderedCols.forEach(col => {
    const sel = document.createElement('select');
    sel.style.width = '100%';
    sel.style.fontSize = '11px';
    sel.onchange = () => { tableFilters[col] = sel.value; showTable(); renderCurrentChart(); };
    sel.innerHTML = '<option value="">--全部--</option>' +
      filterOptions[col].map(v => `<option value="${v.replace(/"/g, '&quot;')}" ${tableFilters[col] === v ? 'selected' : ''}>${v.substring(0, 20)}</option>`).join('');
    const td = document.createElement('td');
    td.style.padding = '2px';
    td.appendChild(sel);
    filterRow.appendChild(td);
  });
  thead.appendChild(filterRow);

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  filteredData.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = orderedCols.map(c => {
      let v = row[c];
      const isStr = typeof v === 'string';
      if (!isStr && v !== null && v !== undefined) v = parseFloat(v);
      const cls = typeof v === 'number' ? (v >= 0 ? 'pos' : 'neg') : '';
      const fmt = typeof v === 'number' ? fmtNum(v) : String(v).substring(0, 30);
      return `<td class="${cls}">${fmt}</td>`;
    }).join('');
    tbody.appendChild(tr);
  });
}

function toggleSort(col) {
  if (tableSortCol === col) {
    tableSortDir = tableSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    tableSortCol = col;
    tableSortDir = 'asc';
  }
  showTable();
}

function showSpreadTable() {
  if (currentData.length === 0) return;
  document.getElementById('tableContainer').style.display = 'block';

  const yFields = getSelectedYFields();
  const aggregated = {};
  currentData.forEach(r => {
    const key = r.spread_range || '未知';
    if (!aggregated[key]) {
      aggregated[key] = { spread_range: key };
      yFields.forEach(f => aggregated[key][f] = 0);
    }
    yFields.forEach(f => {
      const val = parseFloat(r[f]) || 0;
      aggregated[key][f] += val;
    });
  });

  const cols = ['spread_range', ...yFields];
  const rows = Object.values(aggregated).sort((a, b) => a.spread_range < b.spread_range ? -1 : 1);

  const thead = document.getElementById('tableHead');
  thead.innerHTML = '<tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr>';

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  rows.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = cols.map(c => {
      let v = row[c];
      const isNum = typeof v === 'number';
      const cls = isNum ? (v >= 0 ? 'pos' : 'neg') : '';
      const fmt = isNum ? fmtNum(v) : String(v);
      return `<td class="${cls}">${fmt}</td>`;
    }).join('');
    tbody.appendChild(tr);
  });
}

function showSizeTable() {
  if (currentData.length === 0) return;
  document.getElementById('tableContainer').style.display = 'block';

  const yFields = getSelectedYFields();
  const aggregated = {};
  currentData.forEach(r => {
    const key = r.size_range || '未知';
    if (!aggregated[key]) {
      aggregated[key] = { size_range: key };
      yFields.forEach(f => aggregated[key][f] = 0);
    }
    yFields.forEach(f => {
      const val = parseFloat(r[f]) || 0;
      aggregated[key][f] += val;
    });
  });

  const cols = ['size_range', ...yFields];
  const rows = Object.values(aggregated).sort((a, b) => a.size_range < b.size_range ? -1 : 1);

  const thead = document.getElementById('tableHead');
  thead.innerHTML = '<tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr>';

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  rows.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = cols.map(c => {
      let v = row[c];
      const isNum = typeof v === 'number';
      const cls = isNum ? (v >= 0 ? 'pos' : 'neg') : '';
      const fmt = isNum ? fmtNum(v) : String(v);
      return `<td class="${cls}">${fmt}</td>`;
    }).join('');
    tbody.appendChild(tr);
  });
}

function exportCSV() {
  if (!currentData.length) return;
  const headers = tableColumns.join(',');
  const rows = currentData.map(row => tableColumns.map(c => {
    const v = row[c];
    return typeof v === 'number' ? v : `"${v}"`;
  }).join(','));
  const csv = [headers, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `export_${currentTable}_${Date.now()}.csv`; a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// 快捷预设
// ============================================================

async function applyPreset(preset) {
  document.getElementById('dbSelect').value = 'analysis';
  await onDbChange();
  document.getElementById('tableSelect').value = 'k12_token_spread_size_daily_v2';
  await onTableChange();

  if (preset === 'daily_pnl') {
    document.querySelectorAll('#yFieldGroup input').forEach(cb => cb.checked = cb.value === 'alpha');
    setChartType('line', document.querySelector('.chart-type-btn[onclick="setChartType(\'line\', this)"]'));
  } else if (preset === 'heatmap') {
    document.getElementById('noData').style.display = 'none';
    const dateFrom = document.getElementById('dateFrom').value;
    const dateTo = document.getElementById('dateTo').value;
    try {
      const resp = await fetch('/api/heatmap', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ table: currentTable || 'k12_token_spread_size_daily_v2', db: currentDb, metric: 'alpha', date_from: dateFrom, date_to: dateTo })
      });
      const data = await resp.json();
      renderTrueHeatmap(data);
      document.getElementById('chartContainer').style.display = 'block';
      document.getElementById('chartTitle').textContent = 'Alpha 热力图（价差区间 × 规模区间）';
      document.getElementById('tableContainer').style.display = 'none';
    } catch(e) { showError(e.message); }
    return;
  } else if (preset === 'spread_top') {
    document.querySelectorAll('#yFieldGroup input').forEach(cb => cb.checked = ['alpha','theoretical_profit','bundle_fee'].includes(cb.value));
    setChartType('bar', document.querySelector('.chart-type-btn[onclick="setChartType(\'bar\', this)"]'));
  } else if (preset === 'size_top') {
    document.querySelectorAll('#yFieldGroup input').forEach(cb => cb.checked = ['alpha','theoretical_profit','bundle_fee'].includes(cb.value));
    setChartType('bar', document.querySelector('.chart-type-btn[onclick="setChartType(\'bar\', this)"]'));
  }

  renderChart();
}

function renderHeatmap(data) {
  if (currentChart) currentChart.destroy();
  
  // 提取 spread_range 和 size_range 的唯一值
  const spreads = [...new Set(data.map(r => r.spread_range))].sort();
  const sizes = [...new Set(data.map(r => r.size_range))].sort();
  
  const ctx = document.getElementById('mainChart').getContext('2d');
  
  // 简单用柱状图模拟热力图（每组堆叠柱）
  currentChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: spreads,
      datasets: sizes.map((size, i) => {
        const skyPalette = ['#4FA8D7','#7EC4E8','#3A8AB8','#6AAED6','#2E7DAF','#9AC8E3','#A8D4ED','#1F6A9E'];
        return {
          label: size,
          data: spreads.map(sp => {
            const row = data.find(r => r.spread_range === sp && r.size_range === size);
            return row ? row.value : 0;
          }),
          backgroundColor: skyPalette[i % skyPalette.length] + '99',
        };
      })
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: 1.5,
      plugins: {
        legend: { labels: { color: '#888888' } },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmtNum(ctx.raw)}` } }
      },
      scales: {
        x: { ticks: { color: '#888888' }, grid: { color: '#353538' } },
        y: { ticks: { color: '#888888', callback: v => fmtNum(v) }, grid: { color: '#353538' } }
      }
    }
  });
}

// ============================================================
// 工具函数
// ============================================================

function fmtNum(v) {
  if (v === null || v === undefined || isNaN(v)) return '0';
  if (typeof v === 'string') return v;
  v = parseFloat(v);
  if (Math.abs(v) >= 1e6) return (v / 1e6).toFixed(1) + 'm';
  if (Math.abs(v) >= 1e3) return (v / 1e3).toFixed(1) + 'k';
  return v.toFixed(2);
}

function showError(msg) {
  document.getElementById('errorBox').innerHTML = `<div class="error-msg">${msg}</div>`;
}

// ============================================================
// 热力图渲染增强（spread × size 交叉矩阵）
// ============================================================

function renderTrueHeatmap(data) {
  if (currentChart) currentChart.destroy();
  if (!data || data.length === 0) { showError('无热力图数据'); return; }

  const spreads = [...new Set(data.map(r => r.spread_range))].sort();
  const sizes = [...new Set(data.map(r => r.size_range))].sort();

  // 构建矩阵
  const matrix = {};
  data.forEach(r => {
    if (!matrix[r.spread_range]) matrix[r.spread_range] = {};
    matrix[r.spread_range][r.size_range] = r.value;
  });

  const ctx = document.getElementById('mainChart').getContext('2d');
  const skyPalette = ['#4FA8D7','#7EC4E8','#3A8AB8','#6AAED6','#2E7DAF','#9AC8E3','#A8D4ED','#1F6A9E'];

  currentChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: spreads,
      datasets: sizes.map((size, i) => ({
        label: size,
        data: spreads.map(sp => matrix[sp]?.[size] || 0),
        backgroundColor: skyPalette[i % skyPalette.length] + '99',
        borderColor: skyPalette[i % skyPalette.length],
        borderWidth: 1,
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: 1.8,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#888888', font: { size: 11 } } },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${fmtNum(ctx.raw)}`
          }
        }
      },
      scales: {
        x: { ticks: { color: '#888888', maxRotation: 45, font: { size: 10 } }, grid: { color: '#353538' } },
        y: { ticks: { color: '#888888', callback: v => fmtNum(v) }, grid: { color: '#353538' } }
      }
    }
  });

  document.getElementById('chartContainer').style.display = 'block';
  document.getElementById('noData').style.display = 'none';
}
